# Phase-1 commit defenses for SciViz_ParaView.
# Mirrors the shared baseline: secret scanning + basic hygiene + Python lint.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["--config", "C:/Users/colej/.claude/security/gitleaks.toml"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=8000"]   # allows the ~6 MB orbit.gif; field.vtk is gitignored

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff          # lint (visualize.py uses ParaView globals; lint locally, don't block)
      - id: ruff-format
